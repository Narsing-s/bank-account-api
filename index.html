<!DOCTYPE html>
<html>
<head>
<title>Bank Account Management</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1d2671,#c33764);
color:white;
padding:40px;
}

.container{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:15px;
width:800px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
margin-bottom:30px;
}

.section{
margin-bottom:35px;
}

input{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#00c9ff;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#92fe9d;
}

.result{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🏦 Bank Account Management</h1>

<div class="section">
<h2>Create Account</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="dob" type="date">
<input id="mobile" placeholder="Mobile">
<input id="address" placeholder="Address">
<input id="aadhar" placeholder="Aadhar">

<button onclick="createAccount()">Create Account</button>

<div class="result" id="createResult"></div>

</div>


<div class="section">
<h2>Get Account</h2>

<input id="getAccountNumber" placeholder="Account Number">

<button onclick="getAccount()">Get Account</button>

<div class="result" id="getResult"></div>

</div>


<div class="section">
<h2>Delete Account</h2>

<input id="deleteAccountNumber" placeholder="Account Number">

<button onclick="deleteAccount()">Delete</button>

<div class="result" id="deleteResult"></div>

</div>


</div>

<script>

const API="YOUR_NODE_API_URL";

async function createAccount(){

const body={
fullName:document.getElementById("name").value,
email:document.getElementById("email").value,
dateOfBirth:document.getElementById("dob").value,
mobileNumber:document.getElementById("mobile").value,
address:document.getElementById("address").value,
aadharNumber:document.getElementById("aadhar").value
}

try{

const res=await fetch(API+"/accounts",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify(body)
})

const data=await res.json()

document.getElementById("createResult").innerText=
JSON.stringify(data,null,2)

}catch(err){

document.getElementById("createResult").innerText="Error: "+err

}

}

</script>

</body>
</html>
