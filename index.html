<!-- Top bar -->
<header class="app-header">
  <div class="brand">
    <span class="icon">🏦</span>
    <h1>Bank Account Management</h1>
  </div>
  <button id="openSettingsBtn" class="btn ghost" aria-haspopup="dialog" aria-controls="settingsPanel">
    ⚙ Settings
  </button>
</header>

<!-- Your existing content -->
<main class="container">
  <!-- Create Account -->
  <section class="card">
    <h2>Create Account</h2>
    <form id="createForm" autocomplete="off">
      <div class="grid">
        <input id="fullName" placeholder="Full Name" required />
        <input id="email" type="email" placeholder="Email" required />
        <input id="dob" type="date" placeholder="Date of Birth" required />
        <input id="mobile" inputmode="numeric" placeholder="Mobile" maxlength="10" required />
        <input id="address" placeholder="Address" />
        <input id="aadhaar" inputmode="numeric" placeholder="Aadhaar (12 digits)" maxlength="12" />
      </div>
      <button type="submit" class="btn primary">Create Account</button>
    </form>
  </section>

  <!-- Get Account -->
  <section class="card">
    <h2>Get Account</h2>
    <div class="inline">
      <input id="acctGet" placeholder="Account Number" />
      <button id="getBtn" class="btn primary">Get Account</button>
    </div>
  </section>

  <!-- Delete Account -->
  <section class="card">
    <h2>Delete Account</h2>
    <div class="inline">
      <input id="acctDel" placeholder="Account Number" />
      <button id="delBtn" class="btn danger">Delete</button>
    </div>
  </section>
</main>

<!-- Settings Panel -->
<dialog id="settingsPanel" class="panel" aria-label="Application Settings">
  <form method="dialog" class="panel-content">
    <header class="panel-header">
      <h3>Settings</h3>
      <button id="closeSettingsBtn" class="btn ghost" value="cancel" aria-label="Close">✕</button>
    </header>

    <div class="panel-body">
      <fieldset>
        <legend>Theme</legend>
        <label class="row">
          <span>Mode</span>
          <select id="themeMode">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>

        <label class="row">
          <span>Accent Color</span>
          <input id="accentColor" type="color" value="#0ea5e9" />
        </label>

        <label class="row">
          <span>High Contrast</span>
          <input id="highContrast" type="checkbox" />
        </label>
      </fieldset>

      <fieldset>
        <legend>Layout & Accessibility</legend>
        <label class="row">
          <span>Density</span>
          <select id="density">
            <option value="comfortable">Comfortable</option>
            <option value="compact">Compact</option>
          </select>
        </label>

        <label class="row">
          <span>Font Size</span>
          <select id="fontSize">
            <option value="sm">Small</option>
            <option value="md" selected>Medium</option>
            <option value="lg">Large</option>
          </select>
        </label>

        <label class="row">
          <span>Reduce Motion</span>
          <input id="reduceMotion" type="checkbox" />
        </label>
      </fieldset>
    </div>

    <footer class="panel-footer">
      <button class="btn" value="cancel">Cancel</button>
      <button id="saveSettingsBtn" class="btn primary" value="default">Save</button>
    </footer>
  </form>
</dialog>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>
