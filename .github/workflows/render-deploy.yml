services:
  - type: web
    name: bank-account-ui
    env: node
    plan: free
    region: oregon
    autoDeploy: true

    buildCommand: npm install; npm run build
    startCommand: node server.js

    envVars:
      - key: BASE_URL
        value: https://bank-account-proxy-api-jik9pb.5sc6y6-4.usa-e2.cloudhub.io

      - key: RP_ID
        value: narsing-s.github.io
      - key: ORIGIN
        value: https://narsing-s.github.io

      - key: SESSION_SECRET
        generateValue: true

      - key: ALLOWED_ORIGINS
        value: https://narsing-s.github.io,https://bank.narsing-s.dev

    healthCheckPath: /health
    healthCheckTimeout: 300
