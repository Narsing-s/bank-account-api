<!DOCTYPE html>
<html>

<head>

<title>Bank Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

🏦 Banking Dashboard

</header>

<div class="container">


<div class="card">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">
<input id="dob" placeholder="YYYYMMDD">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">
<input id="adhar" placeholder="Aadhar">
<select id="bank">

<option>SBI</option>
<option>HDFC</option>
<option>ICICI</option>
<option>AXIS</option>

</select>

<button onclick="createAccount()">Create</button>

<pre id="createResult"></pre>

</div>



<div class="card">

<h2>Search Account</h2>

<input id="getAcc" placeholder="Account Number">

<button onclick="getAccount()">Search</button>

<div id="bankCard"></div>

</div>



<div class="card">

<h2>Update Account</h2>

<input id="updateAcc" placeholder="Account Number">
<input id="updateName" placeholder="Full Name">
<input id="updateEmail" placeholder="Email">
<input id="updateMobile" placeholder="Mobile">

<button onclick="updateAccount()">Update</button>

<pre id="updateResult"></pre>

</div>



<div class="card">

<h2>Delete Account</h2>

<input id="deleteAcc" placeholder="Account Number">

<button onclick="deleteAccount()">Delete</button>

<pre id="deleteResult"></pre>

</div>



<div class="card">

<h2>Analytics</h2>

<canvas id="chart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
