<!DOCTYPE html>
<html>

<head>

<title>Enterprise Bank Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>🏦 Bank Dashboard</h1>

<div>

<select id="theme">
<option value="">Gradient</option>
<option value="blue">Blue</option>
<option value="pink">Pink</option>
</select>

<select>
<option>English</option>
<option>Hindi</option>
<option>Telugu</option>
</select>

</div>

</header>


<div class="status">
API STATUS : <span id="apiStatus">Checking...</span>
</div>


<div class="container">

<div class="card">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">
<input id="dob" placeholder="YYYYMMDD">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">
<input id="adhar" placeholder="Aadhar Number">

<select id="bank">
<option value="">Select Bank</option>
<option>SBI</option>
<option>HDFC</option>
<option>ICICI</option>
<option>AXIS</option>
</select>

<button onclick="createAccount()">Create</button>

<pre id="createResult"></pre>

</div>



<div class="card">

<h2>Search Account</h2>

<div class="searchBox">

<input id="getAcc" placeholder="Account Number" onkeyup="showSuggestions()">
<div id="suggestions"></div>

</div>

<button onclick="getAccount()">Search</button>

<div id="bankCard"></div>

<div id="getResult"></div>

</div>



<div class="card">

<h2>Transaction Timeline</h2>

<ul id="timeline"></ul>

</div>



<div class="card">

<h2>Analytics</h2>

<canvas id="accountChart"></canvas>

</div>

</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
