<!DOCTYPE html>
<html>

<head>

<title>Bank Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>Bank Account Dashboard</h1>

<div class="settings">

<select id="theme">
<option value="">Gradient</option>
<option value="blue">Blue</option>
<option value="pink">Pink</option>
</select>

<select id="lang">
<option>English</option>
<option>Hindi</option>
<option>Telugu</option>
</select>

</div>

</header>


<div class="container">

<div class="card">

<h2>Create Account</h2>

<input id="name" placeholder="Full Name">

<input id="dob" placeholder="YYYYMMDD">

<input id="mobile" placeholder="Mobile Number">

<input id="email" placeholder="Email">

<input id="address" placeholder="Address">

<input id="adhar" placeholder="Aadhar Number">

<select id="bank">
<option value="">Select Bank</option>
<option value="SBI">SBI</option>
<option value="HDFC">HDFC</option>
<option value="ICICI">ICICI</option>
<option value="AXIS">AXIS</option>
</select>

<button onclick="createAccount()">Create Account</button>

<pre id="createResult"></pre>

</div>



<div class="card">

<h2>Get Account</h2>

<div class="searchBox">

<input id="getAcc" placeholder="Account Number" onkeyup="showSuggestions()">

<div id="suggestions"></div>

</div>

<button onclick="getAccount()">Get Account</button>

<div id="getResult"></div>

</div>



<div class="card">

<h2>Account Dashboard</h2>

<canvas id="accountChart"></canvas>

</div>



<div class="card">

<h2>Update Account</h2>

<input id="updateAcc" placeholder="Account Number">

<input id="updateName" placeholder="Full Name">

<input id="updateAddress" placeholder="Address">

<input id="updateMobile" placeholder="Mobile">

<button onclick="updateAccount()">Update</button>

<pre id="updateResult"></pre>

</div>



<div class="card">

<h2>Delete Account</h2>

<input id="deleteAcc" placeholder="Account Number">

<button onclick="deleteAccount()">Delete</button>

<pre id="deleteResult"></pre>

</div>

</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
