<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Pink Blue Bank UI</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<h1>💳 My Bank</h1>

</header>

<div class="container">

<div class="card balance">

<h2>Total Balance</h2>

<p id="balance">₹0</p>

</div>


<div class="card">

<h3>Create Account</h3>

<input id="name" placeholder="Full Name">

<input id="email" placeholder="Email">

<input id="dob" type="date">

<input id="mobile" placeholder="Mobile">

<input id="aadhaar" placeholder="Aadhaar">

<select id="bank">

<option>SBI</option>

<option>HDFC</option>

<option>ICICI</option>

<option>AXIS</option>

</select>

<button onclick="createAccount()">Create Account</button>

</div>

<div class="card">

<h3>Get Account</h3>

<input id="getAcct" placeholder="Account Number">

<button onclick="getAccount()">Get Account</button>

</div>

<div class="card">

<h3>Update</h3>

<input id="updAcct" placeholder="Account Number">

<input id="updName" placeholder="New Name">

<button onclick="updateAccount()">Update</button>

</div>

<div class="card">

<h3>Delete</h3>

<input id="delAcct" placeholder="Account Number">

<button onclick="deleteAccount()">Delete</button>

</div>

</div>

<pre id="result"></pre>

<script src="app.js"></script>

</body>

</html>
